name: Build TioAnime Plugin

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Build
        run: gradle build

      - name: Make plugins.json
        run: gradle makePluginsJson
      
      - name: Copy cs3 to build folder
        run: cp ./TioAnimeProvider/build/TioAnimeProvider.cs3 ./build/TioAnimeProvider.cs3

      - name: Show build files
        run: find . -name "*.cs3" -o -name "plugins.json" -o -name "repo.json"

      - name: Publish to builds branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: builds
          publish_dir: ./build
          force_orphan: true
